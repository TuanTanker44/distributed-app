syntax = "proto3";

package progress;

service ProgressService {
    rpc SaveProgress(SaveProgressRequest) returns (ProgressResponse) {}
    rpc LoadProgress(LoadProgressRequest) returns (SavedProgress) {}
    rpc ResumeQuiz(ResumeQuizRequest) returns (QuizResumeData) {}
}

message SaveProgressRequest {
    int32 user_id = 1;
    int32 session_id = 2;
    string progress_data = 3; // JSON string
}

message LoadProgressRequest {
    int32 user_id = 1;
    int32 session_id = 2;
}

message ResumeQuizRequest {
    int32 user_id = 1;
    int32 session_id = 2;
}

message ProgressResponse {
    bool success = 1;
    string message = 2;
    string saved_at = 3;
}

message SavedProgress {
    int32 user_id = 1;
    int32 session_id = 2;
    string progress_data = 3;
    string saved_at = 4;
    int64 time_remaining = 5; // milliseconds
    repeated PendingQuestion pending_questions = 6;
}

message PendingQuestion {
    int32 id = 1;
    string question_text = 2;
    map<string, string> options = 3;
    int32 order_number = 4;
}

message QuizResumeData {
    int32 session_id = 1;
    string status = 2;
    int64 time_remaining = 3;
    repeated PendingQuestion pending_questions = 4;
    string expires_at = 5;
}