syntax = "proto3";

package auth;

import "common.proto";

service AuthService {
    rpc Register(RegisterRequest) returns (AuthResponse) {}
    rpc Login(LoginRequest) returns (AuthResponse) {}
}

message RegisterRequest {
    string username = 1;
    string email = 2;
    string password = 3;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message AuthResponse {
    string access_token = 1;
    User user = 3;
}

message User {
    int32 user_id = 1;
    string username = 2;
    string email = 3;
    common.UserRole role = 4;
    string created_at = 5;
}