syntax = "proto3";

package user;

service UserService {
  rpc GetProfile (GetUserRequest) returns (GetUserResponse) {};
  rpc UpdateProfile (UpdateProfileRequest) returns (UpdateProfileResponse) {};
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string created_at = 4;
}