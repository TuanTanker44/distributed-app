syntax = "proto3";

package common;

import "google/protobuf/timestamp.proto";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  ADMIN = 1;
  USER = 2;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  BANNED = 2;
  DELETED = 3;
}

enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  EASY = 1;
  MEDIUM = 2;
  HARD = 3;
}

enum QuizSessionStatus {
  QUIZ_STATUS_UNSPECIFIED = 0;
  IN_PROGRESS = 1;
  COMPLETED = 2;
  EXPIRED = 3;
}